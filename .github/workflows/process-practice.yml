name: Process Practice Update

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  process-issue:
    if: contains(github.event.issue.labels.*.name, 'new-song') || contains(github.event.issue.labels.*.name, 'log-practice')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @actions/github @actions/core

      - name: Process update
        id: process
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/process-issue.js

      - name: Commit changes
        if: steps.process.outcome == 'success'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/songs.json
          git commit -m "Update practice data from issue #${{ github.event.issue.number }}"
          git push

      - name: Close issue
        if: steps.process.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Successfully updated practice data! 🎸'
            })
            github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            })
