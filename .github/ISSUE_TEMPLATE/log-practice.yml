name: Log Practice
description: Record a practice session for a song
title: "[Log Practice]: "
labels: ["log-practice"]
body:
  - type: input
    id: log_song_id
    attributes:
      label: Song ID
      placeholder: e.g. wonderwall
    validations:
      required: true
  - type: input
    id: log_date
    attributes:
      label: Date
      placeholder: YYYY-MM-DD
    validations:
      required: true
  - type: textarea
    id: log_notes
    attributes:
      label: Notes
      placeholder: What did you focus on?
