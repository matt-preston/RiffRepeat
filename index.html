<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riff Repeat | Guitar Practice Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div x-data="practiceApp" class="max-w-4xl mx-auto px-4 py-12" x-cloak>
        <header class="mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-bold text-slate-800">Riff Repeat</h1>
                <p class="text-slate-500 mt-2">Track your progress, one riff at a time.</p>
            </div>
            <div class="text-right">
                <div class="text-sm font-medium text-slate-400 uppercase tracking-wider">Last Session</div>
                <div class="text-2xl font-bold text-indigo-600" x-text="globalLastPracticed"></div>
            </div>
        </header>

        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="text-sm text-slate-500 mb-1">Total Songs</div>
                <div class="text-3xl font-bold" x-text="songs.length"></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="text-sm text-slate-500 mb-1">Practiced this week</div>
                <div class="text-3xl font-bold" x-text="practicedThisWeek"></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-center">
                <a :href="addSongUrl" target="_blank" class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold transition text-center">
                    + Add New Song
                </a>
            </div>
        </div>

        <!-- Song List -->
        <div class="space-y-4">
            <template x-for="song in sortedSongs" :key="song.id">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row md:items-center justify-between hover:border-indigo-200 transition">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800" x-text="song.title"></h3>
                        <p class="text-slate-500" x-text="song.artist"></p>
                    </div>
                    
                    <div class="mt-4 md:mt-0 flex items-center space-x-8">
                        <div class="text-right">
                            <div class="text-xs font-medium text-slate-400 uppercase tracking-wider">Last Practiced</div>
                            <div class="font-semibold" :class="getDaysColor(song)" x-text="getLastPracticedText(song)"></div>
                        </div>
                        
                        <a :href="getLogPracticeUrl(song)" target="_blank" class="py-2 px-6 bg-slate-100 hover:bg-indigo-50 hover:text-indigo-600 text-slate-600 rounded-lg font-medium transition">
                            Log Practice
                        </a>
                    </div>
                </div>
            </template>
        </div>

        <footer class="mt-20 text-center text-slate-400 text-sm">
            <p>Powered by GitHub Issues & Actions. Securely serverless.</p>
        </footer>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('practiceApp', () => ({
                songs: [],
                repoUrl: window.location.origin.includes('github.io') 
                    ? window.location.href.split('/').slice(0, 5).join('/') 
                    : 'https://github.com/OWNER/REPO', // Placeholder for local dev

                async init() {
                    try {
                        const res = await fetch('data/songs.json');
                        const data = await res.json();
                        this.songs = data.songs;
                        
                        // Try to auto-detect repo URL if on GitHub Pages
                        const pathParts = window.location.pathname.split('/');
                        if (window.location.hostname.endsWith('github.io')) {
                            const user = window.location.hostname.split('.')[0];
                            const repo = pathParts[1];
                            this.repoUrl = `https://github.com/${user}/${repo}`;
                        }
                    } catch (e) {
                        console.error('Failed to load songs:', e);
                    }
                },

                get sortedSongs() {
                    return [...this.songs].sort((a, b) => {
                        const dateA = this.getLatestDate(a);
                        const dateB = this.getLatestDate(b);
                        return dateB - dateA;
                    });
                },

                get globalLastPracticed() {
                    if (this.songs.length === 0) return 'Never';
                    const allDates = this.songs.flatMap(s => s.sessions.map(sess => new Date(sess.date)));
                    if (allDates.length === 0) return 'None';
                    const latest = new Date(Math.max(...allDates));
                    return this.formatRelativeDate(latest);
                },

                get practicedThisWeek() {
                    const now = new Date();
                    const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                    return this.songs.filter(s => 
                        s.sessions.some(sess => new Date(sess.date) >= weekAgo)
                    ).length;
                },

                get addSongUrl() {
                    return `${this.repoUrl}/issues/new?template=add-song.yml`;
                },

                getLatestDate(song) {
                    if (!song.sessions || song.sessions.length === 0) return new Date(0);
                    return new Date(Math.max(...song.sessions.map(s => new Date(s.date))));
                },

                getLastPracticedText(song) {
                    const latest = this.getLatestDate(song);
                    if (latest.getTime() === 0) return 'Never';
                    return this.formatRelativeDate(latest);
                },

                formatRelativeDate(date) {
                    const now = new Date();
                    const diffTime = Math.abs(now - date);
                    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    
                    if (diffDays === 0) return 'Today';
                    if (diffDays === 1) return 'Yesterday';
                    if (diffDays < 7) return `${diffDays} days ago`;
                    return date.toLocaleDateString();
                },

                getDaysColor(song) {
                    const latest = this.getLatestDate(song);
                    if (latest.getTime() === 0) return 'text-slate-400';
                    const diffDays = Math.floor((new Date() - latest) / (1000 * 60 * 60 * 24));
                    if (diffDays < 2) return 'text-green-600';
                    if (diffDays < 5) return 'text-amber-500';
                    return 'text-rose-500';
                },

                getLogPracticeUrl(song) {
                    const today = new Date().toISOString().split('T')[0];
                    const body = encodeURIComponent(`### Song ID\n\n${song.id}\n\n### Date\n\n${today}\n\n### Notes\n\n(Enter notes here)`);
                    return `${this.repoUrl}/issues/new?template=log-practice.yml&body=${body}`;
                }
            }));
        });
    </script>
</body>
</html>
