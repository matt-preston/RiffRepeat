<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riff Repeat | Guitar Practice Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .table-container { scrollbar-width: thin; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">
    <div x-data="practiceApp" class="max-w-6xl mx-auto px-4 py-12" x-cloak>
        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h1 class="text-4xl font-bold text-slate-800 flex items-center gap-3">
                    Riff Repeat <span class="text-3xl">🎸</span>
                </h1>
                <p class="text-slate-500 mt-2 text-lg">Your serverless guitar practice companion.</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden md:block">
                    <div class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Last Activity</div>
                    <div class="text-2xl font-bold text-indigo-600" x-text="globalLastPracticed"></div>
                </div>
                <button @click="showAddModal = true" class="py-3 px-6 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold shadow-lg shadow-indigo-200 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
                    Add Song
                </button>
            </div>
        </header>

        <!-- Practice Suggestion -->
        <template x-if="suggestedSong">
            <div class="mb-12 bg-indigo-600 rounded-3xl p-8 text-white shadow-2xl shadow-indigo-200 flex flex-col md:flex-row items-center justify-between gap-6 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8 opacity-10 pointer-events-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-32 w-32" viewBox="0 0 24 24" fill="currentColor"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 4-8 4z"/></svg>
                </div>
                <div class="flex items-center gap-6 relative z-10">
                    <div class="hidden md:flex items-center justify-center w-16 h-16 bg-white/20 backdrop-blur-md rounded-2xl text-3xl">
                        💡
                    </div>
                    <div>
                        <div class="text-indigo-200 text-sm font-bold uppercase tracking-widest mb-1">Suggested for you</div>
                        <h2 class="text-3xl font-black" x-text="suggestedSong.title"></h2>
                        <p class="text-indigo-100 opacity-80" x-text="suggestedSong.artist"></p>
                    </div>
                </div>
                <div class="flex items-center gap-3 relative z-10 w-full md:w-auto">
                    <button @click="openPopup(getLogPracticeUrl(suggestedSong))" class="flex-1 md:flex-none py-4 px-8 bg-white text-indigo-600 rounded-2xl font-black hover:bg-indigo-50 transition-all shadow-lg text-center">
                        Practice Now
                    </button>
                    <template x-if="suggestedSong.youtube">
                        <a :href="suggestedSong.youtube" target="_blank" class="p-4 bg-white/20 hover:bg-white/30 rounded-2xl transition-all" title="Watch on YouTube">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="currentColor"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 4-8 4z"/></svg>
                        </a>
                    </template>
                </div>
            </div>
        </template>

        <!-- Filters & Stats -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
            <div class="lg:col-span-1 flex flex-col gap-4">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /></svg>
                    </span>
                    <input type="text" x-model="search" placeholder="Search songs, artists, or notes..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
                <select x-model="filterCategory" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none appearance-none transition cursor-pointer">
                    <option value="">All Categories</option>
                    <option value="acoustic">Acoustic</option>
                    <option value="electric">Electric</option>
                </select>
            </div>

            <div class="lg:col-span-3 grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl border border-slate-200">
                    <div class="text-xs font-bold text-slate-400 uppercase">Total</div>
                    <div class="text-2xl font-bold" x-text="songs.length"></div>
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-200">
                    <div class="text-xs font-bold text-slate-400 uppercase">Acoustic</div>
                    <div class="text-2xl font-bold" x-text="songs.filter(s => s.category === 'acoustic').length"></div>
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-200">
                    <div class="text-xs font-bold text-slate-400 uppercase">Electric</div>
                    <div class="text-2xl font-bold" x-text="songs.filter(s => s.category === 'electric').length"></div>
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-200">
                    <div class="text-xs font-bold text-slate-400 uppercase">Active</div>
                    <div class="text-2xl font-bold text-indigo-600" x-text="practicedThisWeek"></div>
                </div>
            </div>
        </div>

        <!-- Table View -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto table-container">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th @click="sort('title')" class="px-6 py-4 cursor-pointer hover:text-indigo-600 transition group whitespace-nowrap">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Song Title</span>
                                    <span x-show="sortCol === 'title'" x-text="sortDir === 'asc' ? '↑' : '↓'" class="text-indigo-600"></span>
                                </div>
                            </th>
                            <th @click="sort('artist')" class="px-6 py-4 cursor-pointer hover:text-indigo-600 transition group whitespace-nowrap">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Artist</span>
                                    <span x-show="sortCol === 'artist'" x-text="sortDir === 'asc' ? '↑' : '↓'" class="text-indigo-600"></span>
                                </div>
                            </th>
                            <th @click="sort('category')" class="px-6 py-4 cursor-pointer hover:text-indigo-600 transition group whitespace-nowrap">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Category</span>
                                    <span x-show="sortCol === 'category'" x-text="sortDir === 'asc' ? '↑' : '↓'" class="text-indigo-600"></span>
                                </div>
                            </th>
                            <th class="px-6 py-4 whitespace-nowrap">
                                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Notes</span>
                            </th>
                            <th @click="sort('lastPracticed')" class="px-6 py-4 cursor-pointer hover:text-indigo-600 transition group whitespace-nowrap">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Last Practiced</span>
                                    <span x-show="sortCol === 'lastPracticed'" x-text="sortDir === 'asc' ? '↑' : '↓'" class="text-indigo-600"></span>
                                </div>
                            </th>
                            <th class="px-6 py-4 text-right">
                                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Actions</span>
                            </th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <template x-for="song in filteredAndSortedSongs" :key="song.id">
                            <tr class="hover:bg-slate-50 transition group">
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-2">
                                        <div class="font-bold text-slate-800" x-text="song.title"></div>
                                        <template x-if="song.youtube">
                                            <a :href="song.youtube" target="_blank" class="text-rose-500 hover:text-rose-600 transition" title="Watch on YouTube">
                                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 4-8 4z"/></svg>
                                            </a>
                                        </template>
                                    </div>
                                    <div class="text-xs text-slate-400 md:hidden" x-text="song.artist"></div>
                                </td>
                                <td class="px-6 py-4 hidden md:table-cell">
                                    <div class="text-slate-600" x-text="song.artist"></div>
                                </td>
                                <td class="px-6 py-4">
                                    <span :class="{
                                        'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-600/20': song.category === 'acoustic',
                                        'bg-blue-50 text-blue-700 ring-1 ring-blue-600/20': song.category === 'electric'
                                    }" class="px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider" x-text="song.category"></span>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="text-sm text-slate-500 italic max-w-xs truncate" :title="song.notes" x-text="song.notes || '-'"></div>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="text-sm font-medium" :class="getDaysColor(song)" x-text="getLastPracticedText(song)"></div>
                                </td>
                                <td class="px-6 py-4 text-right space-x-1 whitespace-nowrap">
                                    <button @click="openPopup(getLogPracticeUrl(song))" class="inline-flex items-center justify-center p-2 bg-slate-100 hover:bg-indigo-600 hover:text-white text-slate-600 rounded-lg transition" title="Log Practice">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                                    </button>
                                    <button @click="openPopup(getEditSongUrl(song))" class="inline-flex items-center justify-center p-2 hover:bg-amber-50 hover:text-amber-600 text-slate-300 rounded-lg transition" title="Edit Metadata">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                                    </button>
                                    <button @click="openPopup(getDeleteSongUrl(song))" class="inline-flex items-center justify-center p-2 hover:bg-rose-50 hover:text-rose-600 text-slate-300 rounded-lg transition" title="Delete Song">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            <div x-show="filteredAndSortedSongs.length === 0" class="py-20 text-center text-slate-400">
                <p>No songs found matching your criteria.</p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-20 text-center">
            <div class="flex flex-col items-center gap-2">
                <div class="text-slate-400 text-sm">Powered by GitHub Actions & Issues</div>
                <div class="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-slate-300">
                    <div x-show="isPolling" class="w-2 h-2 bg-indigo-400 rounded-full animate-pulse"></div>
                    <span x-text="isPolling ? 'Checking for updates...' : 'Next check in ' + countdown + 's'"></span>
                </div>
            </div>
            <div class="flex justify-center gap-6 mt-6">
                <a :href="repoUrl" class="text-indigo-600 hover:underline text-xs font-bold uppercase tracking-widest" target="_blank">Source Repo</a>
                <span class="text-slate-200">|</span>
                <a href="#" @click.prevent="window.location.reload()" class="text-slate-400 hover:text-indigo-600 text-xs font-bold uppercase tracking-widest">Refresh Data</a>
            </div>
        </footer>

        <!-- Add Song Selection Modal -->
        <div x-show="showAddModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" @click.self="showAddModal = false" x-transition>
            <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8 transform transition-all" @click.stop>
                <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">Select Category</h2>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <button @click="openAddSong('acoustic')" class="group p-6 border-2 border-slate-100 hover:border-emerald-500 rounded-2xl transition-all text-center">
                        <div class="text-4xl mb-3 group-hover:scale-110 transition">🎸</div>
                        <div class="font-bold text-slate-700">Acoustic</div>
                    </button>
                    <button @click="openAddSong('electric')" class="group p-6 border-2 border-slate-100 hover:border-blue-500 rounded-2xl transition-all text-center">
                        <div class="text-4xl mb-3 group-hover:scale-110 transition">🔌</div>
                        <div class="font-bold text-slate-700">Electric</div>
                    </button>
                </div>
                <button @click="showAddModal = false" class="w-full py-3 text-slate-400 hover:text-slate-600 font-medium transition">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('practiceApp', () => ({
                songs: [],
                search: '',
                filterCategory: '',
                sortCol: 'lastPracticed',
                sortDir: 'desc',
                showAddModal: false,
                repoUrl: '',
                isPolling: false,
                countdown: 60,
                dataHash: '',

                async init() {
                    this.detectRepoUrl();
                    await this.fetchData();
                    this.startPolling();
                },

                async fetchData() {
                    this.isPolling = true;
                    try {
                        const res = await fetch(`data/songs.json?t=${Date.now()}`);
                        const text = await res.text();
                        
                        if (text !== this.dataHash) {
                            console.log('Data change detected, updating UI...');
                            const data = JSON.parse(text);
                            this.songs = data.songs;
                            this.dataHash = text;
                        }
                    } catch (e) {
                        console.error('Failed to load songs:', e);
                    } finally {
                        setTimeout(() => { this.isPolling = false; }, 1000);
                    }
                },

                startPolling() {
                    setInterval(() => {
                        if (this.countdown <= 0) {
                            this.fetchData();
                            this.countdown = 60;
                        } else {
                            this.countdown--;
                        }
                    }, 1000);
                },

                detectRepoUrl() {
                    const host = window.location.hostname;
                    const path = window.location.pathname;
                    if (host.endsWith('github.io')) {
                        const user = host.split('.')[0];
                        const repo = path.split('/')[1];
                        this.repoUrl = `https://github.com/${user}/${repo}`;
                    } else {
                        this.repoUrl = 'https://github.com/OWNER/REPO';
                    }
                },

                sort(col) {
                    if (this.sortCol === col) {
                        this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
                    } else {
                        this.sortCol = col;
                        this.sortDir = 'desc';
                    }
                },

                get filteredAndSortedSongs() {
                    let result = this.songs.filter(s => {
                        const searchLower = this.search.toLowerCase();
                        const matchesSearch = s.title.toLowerCase().includes(searchLower) || 
                                              s.artist.toLowerCase().includes(searchLower) ||
                                              (s.notes && s.notes.toLowerCase().includes(searchLower));
                        const matchesCategory = !this.filterCategory || s.category === this.filterCategory;
                        return matchesSearch && matchesCategory;
                    });

                    return result.sort((a, b) => {
                        let valA, valB;
                        if (this.sortCol === 'lastPracticed') {
                            valA = this.getLatestDate(a).getTime();
                            valB = this.getLatestDate(b).getTime();
                        } else {
                            valA = (a[this.sortCol] || '').toLowerCase();
                            valB = (b[this.sortCol] || '').toLowerCase();
                        }

                        if (this.sortDir === 'asc') return valA > valB ? 1 : -1;
                        return valA < valB ? 1 : -1;
                    });
                },

                get globalLastPracticed() {
                    if (this.songs.length === 0) return 'Never';
                    const allDates = this.songs.flatMap(s => s.sessions.map(sess => new Date(sess.date)));
                    if (allDates.length === 0) return 'None';
                    return this.formatRelativeDate(new Date(Math.max(...allDates)));
                },

                get practicedThisWeek() {
                    const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
                    return this.songs.filter(s => s.sessions.some(sess => new Date(sess.date) >= weekAgo)).length;
                },

                get suggestedSong() {
                    if (this.songs.length === 0) return null;

                    const never = this.songs.filter(s => !s.sessions || s.sessions.length === 0);
                    const practiced = this.songs.filter(s => s.sessions && s.sessions.length > 0);

                    never.sort((a, b) => {
                        // Sub-sort by when added (day only)
                        const dateA = (a.addedAt || '').substring(0, 10);
                        const dateB = (b.addedAt || '').substring(0, 10);
                        if (dateA !== dateB) return dateA.localeCompare(dateB);
                        // Sub-sort again by title
                        return a.title.localeCompare(b.title);
                    });

                    practiced.sort((a, b) => {
                        // Least recently practiced
                        const lastA = this.getLatestDate(a).getTime();
                        const lastB = this.getLatestDate(b).getTime();
                        if (lastA !== lastB) return lastA - lastB;
                        // Least often practiced
                        if (a.sessions.length !== b.sessions.length) return a.sessions.length - b.sessions.length;
                        // Tie breaker: title
                        return a.title.localeCompare(b.title);
                    });

                    return never.length > 0 ? never[0] : (practiced.length > 0 ? practiced[0] : null);
                },

                getLatestDate(song) {
                    if (!song.sessions || song.sessions.length === 0) return new Date(0);
                    return new Date(Math.max(...song.sessions.map(s => new Date(s.date))));
                },

                getLastPracticedText(song) {
                    const latest = this.getLatestDate(song);
                    return latest.getTime() === 0 ? 'Never' : this.formatRelativeDate(latest);
                },

                formatRelativeDate(date) {
                    const diffDays = Math.floor(Math.abs(Date.now() - date) / (1000 * 60 * 60 * 24));
                    if (diffDays === 0) return 'Today';
                    if (diffDays === 1) return 'Yesterday';
                    if (diffDays < 7) return `${diffDays} days ago`;
                    return date.toLocaleDateString();
                },

                getDaysColor(song) {
                    const latest = this.getLatestDate(song);
                    if (latest.getTime() === 0) return 'text-slate-400';
                    const diffDays = Math.floor((Date.now() - latest) / (1000 * 60 * 60 * 24));
                    if (diffDays < 2) return 'text-emerald-600';
                    if (diffDays < 5) return 'text-amber-500';
                    return 'text-rose-500';
                },

                openAddSong(category) {
                    this.showAddModal = false;
                    const params = new URLSearchParams({
                        template: 'add-song.yml',
                        song_category: category
                    });
                    this.openPopup(`${this.repoUrl}/issues/new?${params.toString()}`);
                },

                getEditSongUrl(song) {
                    const params = new URLSearchParams({
                        template: 'edit-song.yml',
                        edit_song_id: song.id,
                        edit_song_title: song.title,
                        edit_artist: song.artist,
                        edit_category: song.category,
                        edit_youtube: song.youtube || '',
                        edit_notes: song.notes || '',
                        title: `[Edit Song]: ${song.title}`
                    });
                    return `${this.repoUrl}/issues/new?${params.toString()}`;
                },

                getLogPracticeUrl(song) {
                    const today = new Date().toISOString().split('T')[0];
                    const params = new URLSearchParams({
                        template: 'log-practice.yml',
                        log_song_id: song.id,
                        log_date: today,
                        title: `[Log Practice]: ${song.title}`
                    });
                    return `${this.repoUrl}/issues/new?${params.toString()}`;
                },

                getDeleteSongUrl(song) {
                    const params = new URLSearchParams({
                        template: 'delete-song.yml',
                        delete_song_id: song.id,
                        title: `[Delete Song]: ${song.title}`
                    });
                    return `${this.repoUrl}/issues/new?${params.toString()}`;
                },

                openPopup(url) {
                    const width = 800;
                    const height = 900;
                    const left = (window.screen.width / 2) - (width / 2);
                    const top = (window.screen.height / 2) - (height / 2);
                    window.open(url, 'GitHubIssue', `width=${width},height=${height},left=${left},top=${top},scrollbars=yes,resizable=yes`);
                }
            }));
        });
    </script>
</body>
</html>
